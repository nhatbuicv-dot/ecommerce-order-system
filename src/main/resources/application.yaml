server:
  port: 8080

spring:
  application:
    name: ecommerce-order-system


  datasource:
    username: root
    password: root
    url: "jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
    driver-class-name: "com.mysql.cj.jdbc.Driver"

    hikari:
      maximum-pool-size: 30

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  signerKey: "gbBX%wjlTtKWoy$90VJae1hJg1^/ugzzRlZuF01ccC8="
  valid-duration: 300 # in second
  refreshable-duration: 36000 # in seconds

logging:
  level:
    org.springframework.security: DEBUG
    com.ecommerce.platform: DEBUG


